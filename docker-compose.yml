services:

  # ── PO Token Sidecar ────────────────────────────────────────────────────────
  # Generates YouTube Proof-of-Origin tokens automatically so yt-dlp can
  # bypass bot-detection on datacenter IPs without any personal cookies.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: always

  # ── Telegram Bot ────────────────────────────────────────────────────────────
  ytdlhub-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytdlhub-bot
    restart: always
    depends_on:
      - bgutil-provider
    environment:
      - Telegram__BotToken=8993945202:AAHkdr64Aqp551g-SNLPNwHuAgDK5SEaiKI
      - YtDlp__ExecutablePath=yt-dlp
      - YtDlp__DownloadDirectory=/app/downloads
      - YtDlp__FileRetentionMinutes=60
      - YtDlp__CookiesFilePath=/app/cookies.txt
      - YtDlp__PotProviderUrl=http://bgutil-provider:4416
    volumes:
      - ./downloads:/app/downloads
      - ./cookies.txt:/app/cookies.txt
