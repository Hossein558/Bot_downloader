services:

  # ── Cloudflare WARP Proxy ───────────────────────────────────────────────────
  # Exposes a SOCKS5 proxy on port 1080 to route traffic through the WARP network.
  # This provides a clean IP to bypass YouTube bot detection and rate limits.
  warp:
    image: monius/docker-warp-socks:latest
    container_name: warp
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp-data:/var/lib/cloudflare-warp

  # ── PO Token Sidecar ────────────────────────────────────────────────────────
  # Generates YouTube Proof-of-Origin tokens automatically.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: always

  # ── Local Telegram Bot API Server (Optional) ──────────────────────────────
  # Uncomment this block and provide YOUR valid API_ID and API_HASH if you
  # want to bypass Telegram's 50MB upload limit. (Register at my.telegram.org)
  # telegram-bot-api:
  #   image: aiogram/telegram-bot-api:latest
  #   container_name: telegram-bot-api
  #   restart: always
  #   environment:
  #     - TELEGRAM_API_ID=YOUR_API_ID
  #     - TELEGRAM_API_HASH=YOUR_API_HASH
  #     - TELEGRAM_LOCAL=1
  #   volumes:
  #     - telegram-bot-api-data:/var/lib/telegram-bot-api

  # ── Web Panel & Telegram Bot ────────────────────────────────────────────────
  ytdlhub-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytdlhub-web
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - warp
      - bgutil-provider
      # - telegram-bot-api
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Telegram__BotToken=8993945202:AAHkdr64Aqp551g-SNLPNwHuAgDK5SEaiKI
      # - Telegram__BaseUrl=http://telegram-bot-api:8081 # Uncomment this to use local API Server
      - YtDlp__ExecutablePath=yt-dlp
      - YtDlp__DownloadDirectory=/app/downloads
      - YtDlp__FileRetentionMinutes=60
      - YtDlp__CookiesFilePath=/app/cookies.txt
      - YtDlp__ProxyUrl=socks5://warp:9091
      - YtDlp__PotProviderUrl=http://bgutil-provider:4416
    volumes:
      - ./downloads:/app/downloads
      - ./cookies.txt:/app/cookies.txt

volumes:
  warp-data:
  telegram-bot-api-data:
